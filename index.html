<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행정구역코드 변환 도구</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <h1>행정구역코드 변환 도구</h1>
  <p class="subtitle">행정안전부 행정구역 변경 이력 조회 &amp; 코드 변환 &amp; 변환 코드 생성</p>
</header>

<nav class="nav-bar">
  <div class="nav-inner">
    <button class="nav-btn active" data-target="section-timeline">
      <span class="num">1</span>변경 이력
    </button>
    <button class="nav-btn" data-target="section-sido">
      <span class="num">2</span>시도코드 조회
    </button>
    <button class="nav-btn" data-target="section-convert">
      <span class="num">3</span>지역코드 변환
    </button>
  </div>
</nav>

<main class="main-content">

  <!-- ===== 섹션 1: 변경 이력 타임라인 ===== -->
  <section id="section-timeline" class="section active">
    <div class="section-heading">
      <h2>행정구역 변경 이력</h2>
      <p>최근 시행된 주요 행정구역 변경 사항을 시간순으로 확인합니다.</p>
    </div>
    <div class="timeline" id="timeline-container">
      <!-- JS로 렌더링 -->
    </div>
  </section>

  <!-- ===== 섹션 2: 시도코드 조회 ===== -->
  <section id="section-sido" class="section">
    <div class="section-heading">
      <h2>시도코드 조회</h2>
      <p>특정 시점에 유효한 17개 시도코드와 시도명을 조회합니다. 변경된 항목은 하이라이트됩니다.</p>
    </div>

    <div class="query-form">
      <div class="form-group">
        <label for="sido-yyyymm">기준년월 (YYYYMM)</label>
        <input type="text" id="sido-yyyymm" class="form-control" placeholder="예: 202401" maxlength="6">
      </div>
      <button class="query-btn" id="sido-query-btn">조회</button>
    </div>

    <div class="result-container" id="sido-result"></div>
  </section>

  <!-- ===== 섹션 3: 지역코드 변환 ===== -->
  <section id="section-convert" class="section">
    <div class="section-heading">
      <h2>지역코드 변환</h2>
      <p>두 시점 사이에 변경된 행정구역코드 매핑을 확인하고, 변환 코드를 생성합니다.</p>
    </div>

    <div class="query-form">
      <div class="convert-form-row" style="width:100%; align-items:flex-end; gap:10px; display:flex; flex-wrap:wrap;">
        <div class="form-group" style="flex:1; min-width:130px;">
          <label for="convert-from">기준년월 From</label>
          <input type="text" id="convert-from" class="form-control" placeholder="예: 202306" maxlength="6">
        </div>
        <div class="convert-sep" style="padding-bottom:9px; color:#94a3b8; font-weight:700;">→</div>
        <div class="form-group" style="flex:1; min-width:130px;">
          <label for="convert-to">기준년월 To</label>
          <input type="text" id="convert-to" class="form-control" placeholder="예: 202602" maxlength="6">
        </div>
        <button class="query-btn" id="convert-query-btn">변환 조회</button>
      </div>
    </div>

    <div class="result-container" id="convert-result"></div>

    <!-- 코드 생성 섹션 (변환 결과 있을 때만 표시) -->
    <div class="code-gen-section" id="code-gen-section" style="display:none;">
      <div class="code-gen-header">
        <h3>변환 코드 생성</h3>
        <div class="lang-tabs">
          <button class="lang-tab active" data-lang="python">Python</button>
          <button class="lang-tab" data-lang="javascript">JavaScript</button>
          <button class="lang-tab" data-lang="sql">SQL</button>
        </div>
      </div>
      <div class="code-output-wrap">
        <pre class="code-pre" id="code-output"></pre>
        <button class="copy-btn" id="copy-btn">복사</button>
      </div>
    </div>
  </section>

</main>

<script src="js/data.js"></script>
<script src="js/codegen.js"></script>
<script src="js/app.js"></script>
</body>
</html>
